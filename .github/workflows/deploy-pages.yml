name: Deploy site to GitHub Pages

# Publishes the FlexiWires brand pages to GitHub Pages.
# The My Theme landing page is served as the site homepage (index.html);
# the other brand pages stay browsable at their own filenames.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site from _brand/
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          # Copy every brand page + the shared assets/ folder.
          cp -R _brand/. _site/
          # My Theme landing page becomes the site homepage.
          cp _brand/landing-mytheme-preview.html _site/index.html
          # Disable Jekyll so nothing is stripped.
          touch _site/.nojekyll
          echo "Assembled _site:"; ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
